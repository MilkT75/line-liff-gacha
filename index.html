<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Card Campaign</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --primary: #FF3366; --secondary: #FF9933; 
            --bg-color: #0b0f19; --bg-gradient: linear-gradient(135deg, #0b0f19, #1a1a2e);
            --glass-bg: rgba(22, 33, 62, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-light: #ffffff; --text-muted: #a0a5b5;
            --color-C: #00C9FF; --color-R: #b100e8; --color-SR: #FFD700; --color-UR: #FF0055;
        }
        
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background: var(--bg-gradient); color: var(--text-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #app { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; padding: 24px; box-sizing: border-box; position: relative; }
        
        .screen { display: none; flex-direction: column; flex: 1; animation: fadeIn 0.4s ease-in-out; }
        .screen.active { display: flex; }
        
        h1, h2, h3 { margin: 0 0 16px 0; font-weight: 500; letter-spacing: 0.5px; text-align: center; }
        p { margin: 0 0 16px 0; color: var(--text-muted); text-align: center; }

        /* --- Glassmorphism UI --- */
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: 0 12px 32px rgba(0,0,0,0.2); }
        
        /* --- Ticket & Scan Section --- */
        .ticket-header { font-size: 14px; color: var(--text-muted); text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .ticket-count { font-size: 42px; font-weight: 600; color: var(--color-C); display: block; margin: 8px 0; text-align: center; text-shadow: 0 0 20px rgba(0, 201, 255, 0.4); }
        
        .scan-container { display: flex; gap: 10px; margin-top: 20px; }
        .scan-container input { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 16px; border-radius: 12px; font-family: 'Kanit', sans-serif; font-size: 14px; }
        .scan-container input::placeholder { color: #666; }
        .btn-scan { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); width: auto; padding: 0 20px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        
        /* --- Gacha Spinner --- */
        .spinner-window { width: 100%; height: 160px; background: rgba(0,0,0,0.4); border-radius: 16px; position: relative; overflow: hidden; margin: 24px 0; display: none; box-shadow: inset 0 0 20px rgba(0,0,0,0.5); }
        .spinner-pointer { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 3px; height: 100%; background: #FF0055; z-index: 10; box-shadow: 0 0 15px #FF0055; }
        .spinner-track { position: absolute; top: 10px; left: 50%; display: flex; height: 140px; width: max-content; }
        .spinner-card { width: 100px; height: 140px; margin: 0 5px; flex-shrink: 0; background: #111; border-radius: 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-sizing: border-box; }
        .spinner-card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Rarity Borders */
        .rarity-C { border: 2px solid var(--color-C); box-shadow: 0 0 12px rgba(0, 201, 255, 0.3); }
        .rarity-R { border: 2px solid var(--color-R); box-shadow: 0 0 12px rgba(177, 0, 232, 0.3); }
        .rarity-SR { border: 2px solid var(--color-SR); box-shadow: 0 0 18px rgba(255, 215, 0, 0.5); }
        .rarity-UR { border: 2px solid var(--color-UR); box-shadow: 0 0 24px rgba(255, 0, 85, 0.6); }

        .card-result { width: 180px; height: 252px; margin: 20px auto; border-radius: 12px; overflow: hidden; display: none; }
        .card-result img { width: 100%; height: 100%; object-fit: cover; }
        .popIn { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        /* --- Buttons --- */
        button { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; padding: 16px 24px; font-size: 16px; border-radius: 14px; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 500; width: 100%; transition: all 0.2s; box-shadow: 0 4px 15px rgba(255, 51, 102, 0.3); }
        button:active { transform: scale(0.97); }
        button:disabled { background: #333; color: #777; box-shadow: none; cursor: not-allowed; }
        
        .btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.2); box-shadow: none; color: var(--text-light); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); }
        .btn-small { padding: 8px 16px; font-size: 13px; border-radius: 20px; width: auto; margin: 0 auto; display: block; }
        
        /* --- Collection --- */
        .prize-card { background: var(--glass-bg); border-radius: 16px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .prize-img { width: 100%; height: 140px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }
        .req-cards-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 16px 0; }
        .req-card { width: 60px; text-align: center; }
        .req-card img { width: 100%; height: 84px; object-fit: cover; border-radius: 8px; border: 1.5px solid transparent; }
        .req-card.missing img { filter: grayscale(100%) opacity(30%); }
        .req-qty { font-size: 11px; margin-top: 6px; background: rgba(0,0,0,0.5); border-radius: 8px; padding: 2px 0; }
        .qty-enough { color: #00FF66; } .qty-not-enough { color: #FF3366; }

        /* --- Forms --- */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        .form-group input, .form-group textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; font-family: 'Kanit', sans-serif; font-size: 15px; box-sizing: border-box; }
        
        /* Loader */
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px auto; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 80% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <!-- หน้า Loading -->
    <div id="screen-loading" class="screen active" style="justify-content: center;">
        <div class="spinner"></div>
        <h2 id="loading-text">กำลังเชื่อมต่อ...</h2>
        <p style="font-size:13px;">(อาจใช้เวลา 2-4 วินาที)</p>
    </div>

    <!-- หน้า Gacha -->
    <div id="screen-gacha" class="screen">
        <div class="glass-panel">
            <div class="ticket-header">สิทธิ์สุ่มการ์ดของคุณ</div>
            <span class="ticket-count" id="ui-ticket-count">0</span>
            
            <button id="btn-start-spin" onclick="requestSpin()">🎰 กดสุ่มการ์ด (ใช้ 1 สิทธิ์)</button>

            <!-- 🌟 เพิ่มระบบสแกน QR หน้าเว็บ -->
            <div class="scan-container">
                <input type="text" id="manual-qr-input" placeholder="กรอกรหัส QR ที่นี่...">
                <button class="btn-scan" onclick="submitManualCode()">📥</button>
                <button class="btn-scan" onclick="openQRScanner()" style="background: rgba(0, 201, 255, 0.1); border-color: var(--color-C); color: var(--color-C);">📷 สแกน</button>
            </div>
            <div style="font-size: 11px; color: #666; text-align: center; margin-top: 8px;">สแกนเพื่อเพิ่มสิทธิ์สุ่มการ์ด</div>
        </div>
        
        <div id="spinner-window" class="spinner-window">
            <div class="spinner-pointer"></div>
            <div id="spinner-track" class="spinner-track"></div>
        </div>

        <div id="card-display" class="card-result">
            <img id="won-card-img" src="">
        </div>
        
        <h3 id="gacha-message" style="color: var(--color-C); margin-top: 10px;"></h3>
        
        <button class="btn-outline btn-small" onclick="document.getElementById('rate-modal').style.display='flex'">ℹ️ เช็คอัตราการออก</button>
        <button class="btn-outline" style="margin-top: 24px;" onclick="goToCollection()">📚 ดูคลังสมบัติของฉัน</button>
    </div>

    <!-- หน้า Collection -->
    <div id="screen-collection" class="screen">
        <h2>คลังสมบัติ</h2>
        <p>สะสมการ์ดเพื่อแลกของรางวัล</p>
        <div id="prizes-container"></div>
        <button class="btn-outline" onclick="goToHome()">⬅ กลับไปหน้าสุ่มการ์ด</button>
    </div>

    <!-- หน้า Form -->
    <div id="screen-claim-form" class="screen">
        <h2>ข้อมูลจัดส่ง</h2>
        <p>กรุณากรอกข้อมูลให้ครบถ้วน</p>
        <div class="glass-panel" style="text-align: left;">
            <div class="form-group"><label>ชื่อ-นามสกุล</label><input type="text" id="input-fullname" required></div>
            <div class="form-group"><label>เบอร์โทรศัพท์</label><input type="tel" id="input-phone" required></div>
            <div class="form-group"><label>ที่อยู่จัดส่ง</label><textarea id="input-address" required></textarea></div>
        </div>
        <button id="btn-submit-claim" onclick="submitClaim()" style="margin-bottom: 12px;">✅ ยืนยันการแลกรางวัล</button>
        <button class="btn-outline" onclick="goToCollection()">ยกเลิก</button>
    </div>
</div>

<!-- Modal อัตราการสุ่ม -->
<div id="rate-modal" class="screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; padding:24px;">
    <div class="glass-panel" style="width: 100%; max-width: 350px; margin: 0 auto;">
        <h3>📊 อัตราการออก</h3>
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:var(--color-C);"><span>🟦 Common (C)</span><span>70%</span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:var(--color-R);"><span>🟪 Rare (R)</span><span>24%</span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; color:var(--color-SR);"><span>🟨 Super Rare (SR)</span><span>5%</span></div>
        <div style="display:flex; justify-content:space-between; margin-bottom:24px; color:var(--color-UR);"><span>🟥 Ultra Rare (UR)</span><span>1%</span></div>
        <button class="btn-outline" onclick="document.getElementById('rate-modal').style.display='none'">ปิดหน้าต่าง</button>
    </div>
</div>

<script>
    const LIFF_ID = "2010585256-WQJUYrJe"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw4U3XymPsklJFDEL5rs-bwkqa8k1Ll0hbKCmyX06UALNBiRZ6qUNTAbK8KZUHGPpkCLQ/exec"; 
    
    let currentUserId = "";
    let currentDisplayName = "";
    let userTickets = 0;
    let selectedPrizeId = ""; 
    let allCardsPool = []; 

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    async function initApp() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            
            const profile = await liff.getProfile();
            currentUserId = profile.userId;
            currentDisplayName = profile.displayName;

            const urlParams = new URLSearchParams(window.location.search);
            const qrCode = urlParams.get('code');

            if (qrCode) await processScanQR(qrCode);
            else await fetchUserData();

        } catch (err) {
            document.getElementById('loading-text').innerText = "เกิดข้อผิดพลาดในการโหลดระบบ";
        }
    }

    // 🌟 1. ฟังก์ชันเปิดกล้องสแกน QR ผ่าน LIFF
    async function openQRScanner() {
        if (liff.scanCodeV2) {
            try {
                const result = await liff.scanCodeV2();
                if (result && result.value) {
                    let scannedCode = result.value;
                    // ถ้า QR ที่สแกนเป็นแบบลิงก์เต็ม ให้ตัดเอาเฉพาะรหัสหลัง ?code=
                    try {
                        let url = new URL(scannedCode);
                        let codeParam = url.searchParams.get('code');
                        if (codeParam) scannedCode = codeParam;
                    } catch(e) { /* ไม่ใช่ลิงก์ ใช้ค่าเดิม */ }
                    
                    showScreen('screen-loading');
                    document.getElementById('loading-text').innerText = "กำลังรับสิทธิ์...";
                    await processScanQR(scannedCode);
                }
            } catch (error) {
                // User กดยกเลิก หรือปิดสิทธิ์ไว้
            }
        } else {
            alert("อุปกรณ์ไม่รองรับ หรือยังไม่ได้เปิดสิทธิ์ Scan QR ใน LINE Console");
        }
    }

    // 🌟 2. ฟังก์ชันกรอกรหัส QR เอง
    async function submitManualCode() {
        const inputCode = document.getElementById('manual-qr-input').value.trim();
        if (!inputCode) return alert("กรุณากรอกรหัส QR");
        
        showScreen('screen-loading');
        document.getElementById('loading-text').innerText = "กำลังรับสิทธิ์...";
        await processScanQR(inputCode);
        document.getElementById('manual-qr-input').value = ""; // ล้างช่องกรอก
    }

    async function processScanQR(qrCode) {
        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "scan", userId: currentUserId, qrCode: qrCode }) });
            const result = await response.json();
            
            if (result.status === "success") alert("🎉 สำเร็จ! ได้รับ 1 สิทธิ์สุ่มการ์ด");
            else alert("❌ " + result.message);
            
            window.history.replaceState({}, document.title, window.location.pathname);
            await fetchUserData();

        } catch (err) { alert("เชื่อมต่อล้มเหลว"); await fetchUserData(); }
    }

    async function fetchUserData() {
        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "checkInventory", userId: currentUserId }) });
            const result = await response.json();
            
            if(result.status === "success") {
                userTickets = result.userBalances["TICKET"] || 0;
                allCardsPool = result.allCards || []; 
                document.getElementById('ui-ticket-count').innerText = userTickets;
                
                const btnSpin = document.getElementById('btn-start-spin');
                if(userTickets > 0) { 
                    btnSpin.innerText = "🎰 กดสุ่มการ์ด (ใช้ 1 สิทธิ์)"; 
                    btnSpin.disabled = false; 
                    btnSpin.className = "";
                } else { 
                    btnSpin.innerText = "สิทธิ์สุ่มหมดแล้ว"; 
                    btnSpin.disabled = true; 
                    btnSpin.className = "btn-outline";
                }
            }
            goToHome();
        } catch (err) { alert("ดึงข้อมูลไม่สำเร็จ"); goToHome(); }
    }

    function goToHome() {
        document.getElementById('gacha-message').innerText = "";
        document.getElementById('spinner-window').style.display = "none";
        document.getElementById('card-display').style.display = "none";
        showScreen('screen-gacha');
    }

    async function requestSpin() {
        if(userTickets < 1) return;
        
        const btnSpin = document.getElementById('btn-start-spin');
        btnSpin.innerText = "⏳ กำลังสุ่ม..."; btnSpin.disabled = true;

        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "spin", userId: currentUserId }) });
            const result = await response.json();
            
            if (result.status === "success") {
                userTickets--;
                document.getElementById('ui-ticket-count').innerText = userTickets;
                startSpinAnimation(result.data.card);
            } else {
                alert("❌ " + result.message);
                fetchUserData();
            }
        } catch (err) { alert("เชื่อมต่อล้มเหลว"); fetchUserData(); }
    }

    function startSpinAnimation(wonCardData) {
        document.getElementById('gacha-message').innerText = "";
        document.getElementById('card-display').style.display = "none";
        
        const track = document.getElementById('spinner-track');
        const windowDiv = document.getElementById('spinner-window');
        windowDiv.style.display = "block";
        
        track.innerHTML = '';
        track.style.transition = 'none';
        track.style.transform = 'translateX(0)';

        for(let i=0; i<45; i++) {
            let el = document.createElement('div');
            el.className = 'spinner-card rarity-' + (i === 38 ? wonCardData.rarity : (allCardsPool[Math.floor(Math.random() * allCardsPool.length)] || {rarity:'C'}).rarity);
            let imgUrl = i === 38 ? wonCardData.image : (allCardsPool[Math.floor(Math.random() * allCardsPool.length)] || {}).image;
            if(imgUrl) el.innerHTML = `<img src="${imgUrl}">`;
            track.appendChild(el);
        }

        void track.offsetWidth; 
        
        let offset = Math.floor(Math.random() * 60) - 30; 
        let distance = 4235 + offset; 

        track.style.transition = 'transform 5s cubic-bezier(0.1, 0.8, 0.2, 1)';
        track.style.transform = `translateX(-${distance}px)`;

        setTimeout(() => {
            windowDiv.style.display = "none";
            const cardDisplay = document.getElementById('card-display');
            const wonImg = document.getElementById('won-card-img');
            
            cardDisplay.className = `card-result popIn rarity-${wonCardData.rarity}`;
            if(wonCardData.image) { wonImg.src = wonCardData.image; wonImg.style.display = "block"; } 
            
            cardDisplay.style.display = "block";
            document.getElementById('gacha-message').innerText = `✨ ได้รับ: ${wonCardData.name} ✨`;
            
            const btnSpin = document.getElementById('btn-start-spin');
            if(userTickets > 0) { btnSpin.innerText = "🎰 สุ่มต่อ (ใช้ 1 สิทธิ์)"; btnSpin.disabled = false; btnSpin.className = ""; } 
            else { btnSpin.innerText = "สิทธิ์สุ่มหมดแล้ว"; btnSpin.disabled = true; btnSpin.className = "btn-outline"; }

        }, 5200);
    }

    async function goToCollection() {
        showScreen('screen-loading');
        document.getElementById('loading-text').innerHTML = "กำลังดึงข้อมูลคลังสมบัติ...";
        try {
            const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "checkInventory", userId: currentUserId }) });
            const result = await response.json();
            
            const container = document.getElementById('prizes-container');
            let html = "";

            if (result.prizesList.length === 0) html = "<p>ยังไม่มีของรางวัลในระบบ</p>";
            else {
                result.prizesList.forEach(prize => {
                    html += `
                    <div class="prize-card">
                        <img src="${prize.prizeImage || 'https://via.placeholder.com/400x150?text=Reward'}" class="prize-img">
                        <h3 style="margin:0 0 8px 0; font-size:16px;">🎁 ${prize.prizeName}</h3>
                        <div class="req-cards-container">`;
                    
                    prize.requirements.forEach(req => {
                        let isMissing = req.isEnough ? '' : 'missing';
                        let rarityClass = `rarity-${req.cardData ? req.cardData.rarity : 'C'}`;
                        let qtyClass = req.isEnough ? 'qty-enough' : 'qty-not-enough';
                        let imgSrc = req.cardData && req.cardData.image ? req.cardData.image : 'https://via.placeholder.com/60?text=?';
                        
                        html += `
                        <div class="req-card ${isMissing}">
                            <img src="${imgSrc}" class="${rarityClass}">
                            <div class="req-qty ${qtyClass}">${req.ownedQty}/${req.requiredQty}</div>
                        </div>`;
                    });

                    html += `</div>`; 
                    if(prize.canClaim) html += `<button onclick="prepareClaim('${prize.prizeId}')">⭐ แลกรางวัลนี้</button>`;
                    else html += `<button disabled>สะสมการ์ดไม่ครบ</button>`;
                    html += `</div>`; 
                });
            }
            container.innerHTML = html; showScreen('screen-collection');
        } catch (err) { alert("ล้มเหลว"); goToHome(); }
    }

    function prepareClaim(prizeId) { selectedPrizeId = prizeId; showScreen('screen-claim-form'); }

    async function submitClaim() {
        const inputName = document.getElementById('input-fullname').value.trim();
        const inputPhone = document.getElementById('input-phone').value.trim();
        const inputAddress = document.getElementById('input-address').value.trim();

        if(!inputName || !inputPhone || !inputAddress) return alert("กรุณากรอกข้อมูลให้ครบครับ");

        const btnSubmit = document.getElementById('btn-submit-claim');
        btnSubmit.innerText = "⏳ กำลังดำเนินการ..."; btnSubmit.disabled = true;

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "claimPrize", userId: currentUserId, prizeId: selectedPrizeId, displayName: currentDisplayName, fullName: inputName, phone: inputPhone, address: inputAddress })
            });
            const result = await response.json();

            if (result.status === "success") { alert("🎉 แลกสำเร็จ! แอดมินจะติดต่อกลับไปครับ"); goToCollection(); } 
            else { alert("ข้อผิดพลาด: " + result.message); btnSubmit.innerText = "✅ ยืนยันการแลกรางวัล"; btnSubmit.disabled = false; }
        } catch (err) { alert("เชื่อมต่อล้มเหลว"); btnSubmit.innerText = "✅ ยืนยันการแลกรางวัล"; btnSubmit.disabled = false; }
    }

    initApp();
</script>
</body>
</html>

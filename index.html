<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Card Campaign</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root { --primary: #FF3366; --secondary: #FF9933; --bg-color: #1a1a2e; --text-light: #ffffff; --card-bg: #16213e; }
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background: linear-gradient(135deg, var(--bg-color), #0f3460); color: var(--text-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        #app { width: 100%; max-width: 480px; min-height: 100vh; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; text-align: center; position: relative; }
        .screen { display: none; flex-direction: column; justify-content: center; align-items: center; flex: 1; animation: fadeIn 0.5s ease-in-out; }
        .screen.active { display: flex; }
        h1, h2, h3 { margin: 10px 0; }
        .spinner { width: 50px; height: 50px; border: 5px solid rgba(255, 255, 255, 0.3); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        .gacha-box { font-size: 100px; margin: 30px 0; cursor: pointer; transition: transform 0.2s; }
        .shake { animation: shake 0.5s infinite; }
        .popIn { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .card-result { background: linear-gradient(145deg, #FFD700, #FFA500); color: #000; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); font-size: 24px; font-weight: bold; margin-bottom: 20px; display: none; }
        .collection-list { width: 100%; background: var(--card-bg); padding: 15px; border-radius: 10px; margin: 15px 0; text-align: left; }
        .card-item { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .card-item.missing { color: #888; font-style: italic; }
        
        /* สไตล์สำหรับฟอร์มกรอกข้อมูล */
        .form-group { width: 100%; text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; color: #ddd; }
        input[type="text"], input[type="tel"], textarea { width: 100%; padding: 12px; border-radius: 8px; border: none; font-family: 'Kanit', sans-serif; box-sizing: border-box; background: rgba(255,255,255,0.9); font-size: 16px; }
        textarea { resize: vertical; min-height: 80px; }
        
        button { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; font-family: 'Kanit', sans-serif; font-weight: 600; box-shadow: 0 4px 15px rgba(255, 51, 102, 0.4); transition: transform 0.2s; margin-top: 15px; width: 100%; }
        button:active { transform: scale(0.95); }
        button.btn-claim { background: linear-gradient(90deg, #00C9FF, #92FE9D); color: #000; display: none; }
        button.btn-back { background: transparent; border: 2px solid white; box-shadow: none; margin-top: 10px; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px) rotate(-5deg); } 50% { transform: translateX(10px) rotate(5deg); } 75% { transform: translateX(-10px) rotate(-5deg); } 100% { transform: translateX(0); } }
        @keyframes popIn { 0% { transform: scale(0); opacity: 0; } 80% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div id="app">
    <!-- หน้า 1: Loading -->
    <div id="screen-loading" class="screen active">
        <div class="spinner"></div>
        <h2 id="loading-text">กำลังเตรียมระบบ...</h2>
    </div>

    <!-- หน้า 2: Gacha / สแกนผลลัพธ์ -->
    <div id="screen-gacha" class="screen">
        <h2>🎉 สุ่มการ์ดรางวัล!</h2>
        <p>คุณมีสิทธิ์เปิดกล่องสุ่ม 1 ครั้ง</p>
        <div id="gacha-box" class="gacha-box">🎁</div>
        <div id="card-display" class="card-result"><span id="card-name-text">การ์ดรางวัล</span></div>
        <p id="gacha-message"></p>
        <button onclick="goToCollection()">📚 ดูคอลเลกชันของฉัน</button>
    </div>

    <!-- หน้า 3: คอลเลกชัน -->
    <div id="screen-collection" class="screen">
        <h2>📚 คอลเลกชันการ์ด</h2>
        <div class="collection-list" id="collection-content">กำลังโหลดข้อมูล...</div>
        <button id="btn-claim-reward" class="btn-claim" onclick="showClaimForm()">🎁 กดรับรางวัล</button>
        <button class="btn-back" onclick="goToGacha()">⬅ กลับไปหน้าหลัก</button>
    </div>

    <!-- หน้า 4: กรอกข้อมูลรับรางวัล (เพิ่มใหม่) -->
    <div id="screen-claim-form" class="screen">
        <h2>📦 ข้อมูลจัดส่งรางวัล</h2>
        <p style="font-size: 14px; margin-bottom: 20px;">กรุณากรอกข้อมูลให้ครบถ้วน เพื่อให้ทีมงานจัดส่งของรางวัลได้ถูกต้องครับ</p>
        
        <div class="form-group">
            <label>ชื่อ-นามสกุลผู้รับ</label>
            <input type="text" id="input-fullname" placeholder="เช่น นายสมชาย ใจดี" required>
        </div>
        <div class="form-group">
            <label>เบอร์โทรศัพท์ติดต่อ</label>
            <input type="tel" id="input-phone" placeholder="เช่น 0812345678" required>
        </div>
        <div class="form-group">
            <label>ที่อยู่สำหรับจัดส่ง</label>
            <textarea id="input-address" placeholder="บ้านเลขที่ หมู่ ซอย ถนน ตำบล อำเภอ จังหวัด รหัสไปรษณีย์" required></textarea>
        </div>
        
        <button id="btn-submit-claim" onclick="submitClaim()">✅ ยืนยันการรับรางวัล</button>
        <button class="btn-back" onclick="goToCollection()">⬅ ยกเลิก</button>
    </div>
</div>

<script>
    // ==========================================
    // ⚠️ นำค่าของคุณมาใส่ที่นี่
    // ==========================================
    const LIFF_ID = "2010585256-WQJUYrJe"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwqLrSV-qlEsquPwuh57F3hmKVBx8jkt_HKCjL7e4L4GWW0Z1PXTMmxTSQEkL-dBk3yKQ/exec"; 
    
    let currentUserId = "";
    let currentDisplayName = "";
    let currentQrCode = "";

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    async function initApp() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            
            // ดึงข้อมูลโปรไฟล์มาเก็บไว้
            const profile = await liff.getProfile();
            currentUserId = profile.userId;
            currentDisplayName = profile.displayName; // ชื่อไลน์ของลูกค้า

            const urlParams = new URLSearchParams(window.location.search);
            currentQrCode = urlParams.get('code');

            if (currentQrCode) processScanQR(currentQrCode);
            else goToCollection();

        } catch (err) {
            console.error("LIFF Init Error:", err);
            document.getElementById('loading-text').innerText = "เกิดข้อผิดพลาดในการโหลด LINE LIFF";
        }
    }

    // --- ระบบสุ่ม ---
    async function processScanQR(qrCode) {
        document.getElementById('loading-text').innerText = "กำลังตรวจสอบรหัส...";
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "scan", userId: currentUserId, qrCode: qrCode })
            });
            const result = await response.json();
            showScreen('screen-gacha');
            const gachaBox = document.getElementById('gacha-box');
            const gachaMessage = document.getElementById('gacha-message');
            const cardDisplay = document.getElementById('card-display');
            const cardNameText = document.getElementById('card-name-text');

            if (result.status === "success") {
                gachaMessage.innerText = "แตะที่กล่องเพื่อเปิด!";
                gachaBox.style.display = "block";
                cardDisplay.style.display = "none";
                gachaBox.onclick = () => {
                    gachaBox.classList.add('shake');
                    gachaMessage.innerText = "กำลังสุ่ม...";
                    setTimeout(() => {
                        gachaBox.style.display = "none";
                        gachaBox.classList.remove('shake');
                        cardNameText.innerText = result.data.card;
                        cardDisplay.style.display = "block";
                        cardDisplay.classList.add('popIn');
                        gachaMessage.innerText = "ยินดีด้วย! คุณได้รับ " + result.data.card;
                    }, 1500); 
                };
            } else {
                gachaBox.innerHTML = "❌";
                gachaMessage.innerText = result.message;
            }
        } catch (err) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์"); }
    }

    // --- ระบบเช็คคอลเลกชัน ---
    async function goToCollection() {
        showScreen('screen-loading');
        document.getElementById('loading-text').innerText = "กำลังโหลดคอลเลกชัน...";

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "checkBounty", userId: currentUserId })
            });
            const result = await response.json();
            const contentDiv = document.getElementById('collection-content');
            let html = "";

            if (result.ownedCards && result.ownedCards.length > 0) {
                html += `<div><strong>การ์ดที่คุณมี:</strong></div>`;
                result.ownedCards.forEach(card => { html += `<div class="card-item">✅ ${card}</div>`; });
            } else { html += `<div class="card-item">คุณยังไม่มีการ์ดเลย</div>`; }

            if (result.missingCards && result.missingCards.length > 0) {
                html += `<div style="margin-top:15px;"><strong>การ์ดที่ยังขาด:</strong></div>`;
                result.missingCards.forEach(card => { html += `<div class="card-item missing">❌ ${card}</div>`; });
            }
            contentDiv.innerHTML = html;

            const btnClaim = document.getElementById('btn-claim-reward');
            if (result.canClaim) {
                btnClaim.style.display = "block";
                if (result.hasClaimed) {
                    btnClaim.innerText = "✅ รับรางวัลแล้ว";
                    btnClaim.style.background = "#555";
                    btnClaim.style.color = "#fff";
                    btnClaim.onclick = null; 
                } else {
                    btnClaim.innerText = "🎁 กดรับรางวัล";
                    btnClaim.style.background = "linear-gradient(90deg, #00C9FF, #92FE9D)";
                    btnClaim.style.color = "#000";
                    btnClaim.onclick = showClaimForm; 
                }
            } else { btnClaim.style.display = "none"; }
            showScreen('screen-collection');
        } catch (err) { alert("ดึงข้อมูลคอลเลกชันไม่สำเร็จ"); }
    }

    // --- ระบบกรอกฟอร์ม ---
    function showClaimForm() {
        showScreen('screen-claim-form');
    }

    // --- ระบบกดยืนยันการรับรางวัล ---
    async function submitClaim() {
        const inputName = document.getElementById('input-fullname').value.trim();
        const inputPhone = document.getElementById('input-phone').value.trim();
        const inputAddress = document.getElementById('input-address').value.trim();

        if(!inputName || !inputPhone || !inputAddress) {
            alert("กรุณากรอกข้อมูลให้ครบทุกช่องครับ");
            return;
        }

        const btnSubmit = document.getElementById('btn-submit-claim');
        btnSubmit.innerText = "กำลังประมวลผล...";
        btnSubmit.onclick = null; 

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ 
                    action: "claimReward", 
                    userId: currentUserId,
                    displayName: currentDisplayName, // ส่งชื่อไลน์ไปด้วย
                    fullName: inputName,
                    phone: inputPhone,
                    address: inputAddress
                })
            });
            const result = await response.json();

            if (result.status === "success") {
                alert("🎉 บันทึกข้อมูลสำเร็จ! ระบบได้ส่งข้อมูลให้แอดมินแล้ว โปรดรอรับของรางวัลครับ");
                goToCollection(); 
            } else {
                alert("เกิดข้อผิดพลาด: " + result.message);
                btnSubmit.innerText = "✅ ยืนยันการรับรางวัล";
                btnSubmit.onclick = submitClaim;
            }
        } catch (err) {
            alert("เชื่อมต่อล้มเหลว กรุณาลองใหม่");
            btnSubmit.innerText = "✅ ยืนยันการรับรางวัล";
            btnSubmit.onclick = submitClaim;
        }
    }

    function goToGacha() {
        if(currentQrCode) showScreen('screen-gacha');
        else liff.closeWindow(); 
    }

    initApp();
</script>

</body>
</html>
